name: multiarch_verify

# Builds overlay image on amd64 (native) and arm64 (QEMU) so submitters without
# Apple Silicon can still prove OR-Tools + gpr_planning work cross-platform.

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  overlay:
    name: overlay (${{ matrix.arch }})
    runs-on: ubuntu-latest
    timeout-minutes: 180
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            arch: amd64
          - platform: linux/arm64
            arch: arm64
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and verify overlay image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          target: overlay
          platforms: ${{ matrix.platform }}
          push: false
          tags: gpr_coverage:ci-${{ matrix.arch }}
          # verify-ortools-build.sh runs inside the overlay stage after colcon build.

      - name: Summary
        run: |
          echo "Passed overlay build on ${{ matrix.platform }} (OR-Tools + gpr_planning verified)."
