name: gpr_coverage_docker

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  schedule:
    - cron: '0 0 * * *'
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build dev image (native amd64 CI runner)
        uses: docker/build-push-action@v5
        with:
          file: docker/Dockerfile
          target: dev
          push: false
          # No platform: pin — local/CI builds use the host architecture (amd64 here).
